<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मंडी उपनिरीक्षक प्रश्न बैंक 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400;600;800&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --card: #111827;
    --card2: #1a2235;
    --accent: #f59e0b;
    --accent2: #10b981;
    --accent3: #3b82f6;
    --accent4: #ec4899;
    --accent5: #8b5cf6;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #1e293b;
    --correct: #10b981;
    --wrong: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans Devanagari', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    padding: 24px 20px;
    text-align: center;
    border-bottom: 2px solid var(--accent);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(245,158,11,0.15) 0%, transparent 70%);
  }
  .header h1 {
    font-family: 'Baloo Bhai 2', cursive;
    font-size: clamp(20px, 5vw, 32px);
    font-weight: 800;
    color: var(--accent);
    position: relative;
    text-shadow: 0 0 30px rgba(245,158,11,0.4);
  }
  .header p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    position: relative;
  }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    margin-top: 8px;
    position: relative;
  }

  /* Subject tabs */
  .tabs-wrap {
    overflow-x: auto;
    padding: 16px 16px 0;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 8px;
    min-width: max-content;
  }
  .tab {
    padding: 10px 18px;
    border-radius: 10px 10px 0 0;
    border: none;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card2);
    color: var(--muted);
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  .tab.active {
    color: #fff;
    border-bottom-color: var(--tab-color);
    background: var(--card);
  }
  .tab:hover:not(.active) { background: var(--card); color: var(--text); }

  /* Main content */
  .main { padding: 0 16px 80px; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 10px;
    padding: 14px 0;
    flex-wrap: wrap;
  }
  .stat-box {
    flex: 1;
    min-width: 80px;
    background: var(--card);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-box .num {
    font-family: 'Baloo Bhai 2', cursive;
    font-size: 22px;
    font-weight: 800;
  }
  .stat-box .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .num.total { color: var(--accent3); }
  .num.correct { color: var(--correct); }
  .num.wrong { color: var(--wrong); }
  .num.pending { color: var(--accent); }

  /* Progress bar */
  .progress-wrap { margin-bottom: 14px; }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
  }
  .progress-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }

  /* Question card */
  .q-card {
    background: var(--card);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
    position: relative;
  }
  .q-card.answered-correct { border-color: var(--correct); }
  .q-card.answered-wrong { border-color: var(--wrong); }
  .q-num {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .q-num-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 700;
    color: #000;
  }
  .q-text {
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    padding: 10px 14px;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    color: var(--text);
    font-family: 'Noto Sans Devanagari', sans-serif;
    line-height: 1.5;
  }
  .option:hover:not(:disabled) {
    background: #1e2d45;
    border-color: var(--accent3);
    transform: translateX(3px);
  }
  .option.correct { background: rgba(16,185,129,0.15); border-color: var(--correct); color: #6ee7b7; }
  .option.wrong { background: rgba(239,68,68,0.15); border-color: var(--wrong); color: #fca5a5; }
  .option:disabled { cursor: default; transform: none; }

  .explanation {
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(59,130,246,0.1);
    border-left: 3px solid var(--accent3);
    border-radius: 6px;
    font-size: 12px;
    color: #93c5fd;
    line-height: 1.5;
    display: none;
  }
  .explanation.show { display: block; }

  /* Reset btn */
  .reset-btn {
    display: block;
    margin: 20px auto 0;
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--accent), #d97706);
    border: none;
    border-radius: 10px;
    color: #000;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans Devanagari', sans-serif;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(245,158,11,0.3);
  }
  .reset-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(245,158,11,0.4); }

  /* Score card at bottom */
  .score-card {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(17,24,39,0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    z-index: 100;
  }
  .score-info { font-size: 12px; color: var(--muted); }
  .score-pct {
    font-family: 'Baloo Bhai 2', cursive;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏛️ मंडी उपनिरीक्षक प्रश्न बैंक</h1>
  <p>CG Vyapam 2026 | परीक्षा तैयारी</p>
  <span class="badge">प्रत्येक विषय — 50 प्रश्न</span>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat-box"><div class="num total" id="s-total">0</div><div class="lbl">कुल प्रश्न</div></div>
    <div class="stat-box"><div class="num correct" id="s-correct">0</div><div class="lbl">सही ✓</div></div>
    <div class="stat-box"><div class="num wrong" id="s-wrong">0</div><div class="lbl">गलत ✗</div></div>
    <div class="stat-box"><div class="num pending" id="s-pending">0</div><div class="lbl">बाकी</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">0 / 50 प्रश्न हल किए</div>
  </div>
  <div id="questions-container"></div>
  <button class="reset-btn" onclick="resetQuiz()">🔄 पुनः प्रयास करें</button>
</div>

<div class="score-card">
  <div class="score-info" id="score-info">इस विषय का स्कोर</div>
  <div class="score-pct" id="score-pct">0%</div>
</div>

<script>
const subjects = [
  { id: 'gk', name: 'सामान्य ज्ञान', color: '#f59e0b' },
  { id: 'cg', name: 'CG सामान्य ज्ञान', color: '#10b981' },
  { id: 'reasoning', name: 'तर्कशक्ति', color: '#3b82f6' },
  { id: 'math', name: 'गणित', color: '#ec4899' },
  { id: 'english', name: 'English', color: '#8b5cf6' }
];

const allQuestions = {
  gk: [
    { q: "भारत का संविधान कब लागू हुआ?", opts: ["15 अगस्त 1947", "26 जनवरी 1950", "26 नवंबर 1949", "2 अक्टूबर 1948"], ans: 1, exp: "भारत का संविधान 26 जनवरी 1950 को लागू हुआ, इसीलिए यह दिन गणतंत्र दिवस के रूप में मनाया जाता है।" },
    { q: "भारत के प्रथम राष्ट्रपति कौन थे?", opts: ["जवाहरलाल नेहरू", "डॉ. राजेंद्र प्रसाद", "सर्वपल्ली राधाकृष्णन", "लाल बहादुर शास्त्री"], ans: 1, exp: "डॉ. राजेंद्र प्रसाद भारत के पहले राष्ट्रपति (1950-1962) थे।" },
    { q: "संयुक्त राष्ट्र संघ की स्थापना किस वर्ष हुई?", opts: ["1944", "1945", "1946", "1947"], ans: 1, exp: "UNO की स्थापना 24 अक्टूबर 1945 को हुई थी।" },
    { q: "भारत में लोकसभा में कुल कितनी सीटें हैं?", opts: ["542", "543", "545", "550"], ans: 1, exp: "लोकसभा में 543 निर्वाचित सीटें हैं।" },
    { q: "नोबेल पुरस्कार पाने वाले पहले भारतीय कौन थे?", opts: ["सी.वी. रमन", "रवींद्रनाथ टैगोर", "अमर्त्य सेन", "मदर टेरेसा"], ans: 1, exp: "रवींद्रनाथ टैगोर को 1913 में साहित्य का नोबेल पुरस्कार मिला था।" },
    { q: "भारत का राष्ट्रीय फल क्या है?", opts: ["केला", "आम", "अमरूद", "सेब"], ans: 1, exp: "आम (Mangifera indica) भारत का राष्ट्रीय फल है।" },
    { q: "भारत में कितने राज्य हैं?", opts: ["27", "28", "29", "30"], ans: 1, exp: "वर्तमान में भारत में 28 राज्य और 8 केंद्र शासित प्रदेश हैं।" },
    { q: "विश्व का सबसे बड़ा महाद्वीप कौन सा है?", opts: ["अफ्रीका", "एशिया", "यूरोप", "उत्तरी अमेरिका"], ans: 1, exp: "एशिया क्षेत्रफल और जनसंख्या दोनों में सबसे बड़ा महाद्वीप है।" },
    { q: "भारत का राष्ट्रीय पशु क्या है?", opts: ["शेर", "बाघ", "हाथी", "गाय"], ans: 1, exp: "बाघ (Bengal Tiger) भारत का राष्ट्रीय पशु है।" },
    { q: "माउंट एवरेस्ट किस देश में है?", opts: ["भारत", "तिब्बत/नेपाल", "चीन", "भूटान"], ans: 1, exp: "माउंट एवरेस्ट नेपाल और तिब्बत (चीन) की सीमा पर स्थित है।" },
    { q: "पंचायती राज व्यवस्था किस संविधान संशोधन द्वारा लागू हुई?", opts: ["70वां", "73वां", "74वां", "76वां"], ans: 1, exp: "73वें संविधान संशोधन (1992) द्वारा पंचायती राज को संवैधानिक दर्जा मिला।" },
    { q: "भारत का सर्वोच्च न्यायालय कहाँ स्थित है?", opts: ["मुंबई", "नई दिल्ली", "कोलकाता", "चेन्नई"], ans: 1, exp: "भारत का सर्वोच्च न्यायालय नई दिल्ली में स्थित है।" },
    { q: "किस ग्रह को लाल ग्रह कहा जाता है?", opts: ["बृहस्पति", "मंगल", "शनि", "शुक्र"], ans: 1, exp: "मंगल ग्रह की सतह पर आयरन ऑक्साइड (जंग) के कारण यह लाल दिखता है।" },
    { q: "भारतीय रिजर्व बैंक की स्थापना कब हुई?", opts: ["1935", "1947", "1950", "1955"], ans: 0, exp: "RBI की स्थापना 1 अप्रैल 1935 को हुई।" },
    { q: "भारत का राष्ट्रीय गान किसने लिखा?", opts: ["बंकिम चंद्र", "रवींद्रनाथ टैगोर", "सरोजिनी नायडू", "सुभाष चंद्र बोस"], ans: 1, exp: "जन गण मन रवींद्रनाथ टैगोर द्वारा रचित है।" },
    { q: "विश्व की सबसे लंबी नदी कौन सी है?", opts: ["अमेज़न", "नील", "गंगा", "यांग्त्ज़ी"], ans: 1, exp: "नील नदी (6,650 km) विश्व की सबसे लंबी नदी है।" },
    { q: "भारत के प्रधानमंत्री की नियुक्ति कौन करता है?", opts: ["लोकसभा अध्यक्ष", "राष्ट्रपति", "उपराष्ट्रपति", "सर्वोच्च न्यायालय"], ans: 1, exp: "राष्ट्रपति प्रधानमंत्री की नियुक्ति करते हैं।" },
    { q: "ओलंपिक खेल कितने वर्षों में एक बार होते हैं?", opts: ["2", "3", "4", "5"], ans: 2, exp: "ओलंपिक खेल प्रत्येक 4 वर्षों में आयोजित होते हैं।" },
    { q: "जीएसटी कब लागू हुई?", opts: ["1 अप्रैल 2017", "1 जुलाई 2017", "1 जनवरी 2018", "26 जनवरी 2017"], ans: 1, exp: "GST (वस्तु एवं सेवा कर) 1 जुलाई 2017 को लागू हुई।" },
    { q: "भारत में हरित क्रांति किस दशक में हुई?", opts: ["1950 के दशक", "1960 के दशक", "1970 के दशक", "1980 के दशक"], ans: 1, exp: "1960 के दशक में डॉ. एम.एस. स्वामीनाथन के नेतृत्व में हरित क्रांति हुई।" },
    { q: "भारत का सबसे बड़ा राज्य (क्षेत्रफल) कौन सा है?", opts: ["उत्तर प्रदेश", "राजस्थान", "मध्यप्रदेश", "महाराष्ट्र"], ans: 1, exp: "राजस्थान क्षेत्रफल में भारत का सबसे बड़ा राज्य है।" },
    { q: "संसद के कितने सदन हैं?", opts: ["1", "2", "3", "4"], ans: 1, exp: "भारतीय संसद के दो सदन हैं - लोकसभा (निम्न सदन) और राज्यसभा (उच्च सदन)।" },
    { q: "विश्व स्वास्थ्य संगठन (WHO) का मुख्यालय कहाँ है?", opts: ["न्यूयॉर्क", "जिनेवा", "पेरिस", "लंदन"], ans: 1, exp: "WHO का मुख्यालय जिनेवा, स्विट्ज़रलैंड में है।" },
    { q: "भारतीय संविधान का अनुच्छेद 370 किस राज्य से संबंधित था?", opts: ["हिमाचल प्रदेश", "जम्मू-कश्मीर", "उत्तराखंड", "पंजाब"], ans: 1, exp: "अनुच्छेद 370 जम्मू-कश्मीर को विशेष दर्जा देता था, जिसे 2019 में हटाया गया।" },
    { q: "भारत में मतदान की न्यूनतम आयु क्या है?", opts: ["16 वर्ष", "18 वर्ष", "21 वर्ष", "25 वर्ष"], ans: 1, exp: "61वें संविधान संशोधन (1988) के बाद मतदान आयु 21 से घटाकर 18 वर्ष की गई।" },
    { q: "प्रकाश की गति कितनी है?", opts: ["3×10⁸ m/s", "3×10⁶ m/s", "3×10⁷ m/s", "3×10⁹ m/s"], ans: 0, exp: "प्रकाश की गति लगभग 3×10⁸ मीटर प्रति सेकंड (3 लाख km/s) है।" },
    { q: "भारत का पहला अंतरिक्ष यात्री कौन था?", opts: ["एपीजे अब्दुल कलाम", "राकेश शर्मा", "विक्रम साराभाई", "सतीश धवन"], ans: 1, exp: "राकेश शर्मा 1984 में सोवियत अंतरिक्ष यान में अंतरिक्ष जाने वाले पहले भारतीय थे।" },
    { q: "भारत के किस राज्य में सबसे अधिक जिले हैं?", opts: ["उत्तर प्रदेश", "राजस्थान", "मध्यप्रदेश", "बिहार"], ans: 0, exp: "उत्तर प्रदेश में सबसे अधिक 75 जिले हैं।" },
    { q: "मानव शरीर में हड्डियों की संख्या कितनी होती है?", opts: ["200", "206", "210", "215"], ans: 1, exp: "एक वयस्क मानव के शरीर में 206 हड्डियाँ होती हैं।" },

    { q: "Choose the correct form: I ___ watching TV when she called.", opts: ["was", "am", "were", "is"], ans: 0, exp: "Past Continuous tense with 'I' uses 'was'." },
    { q: "Synonym of 'Commence':", opts: ["End", "Begin", "Pause", "Continue"], ans: 1, exp: "'Commence' means to begin or start." },
    { q: "Which sentence is correct?", opts: ["She don't like tea.", "She doesn't likes tea.", "She doesn't like tea.", "She not like tea."], ans: 2, exp: "With third person singular, use 'doesn't + base verb'." },
    { q: "Antonym of 'Ancient':", opts: ["Old", "Modern", "Historical", "Classic"], ans: 1, exp: "'Ancient' means very old, its antonym is 'Modern'." },
    { q: "One word substitute for 'One who walks in sleep':", opts: ["Insomniac", "Somniloquist", "Somnambulist", "Narcissist"], ans: 2, exp: "'Somnambulist' means a sleepwalker." },
    { q: "Fill in: Neither he nor I ___ going.", opts: ["am", "is", "are", "were"], ans: 0, exp: "With 'neither...nor', the verb agrees with the subject closer to it (I → am)." },
    { q: "Change to indirect speech: He said, 'I am happy.'", opts: ["He said he was happy.", "He said I am happy.", "He told that I was happy.", "He said that I am happy."], ans: 0, exp: "In indirect speech, tense shifts back and 'I' changes to 'he'." },
    { q: "Meaning of the idiom 'Burning the midnight oil':", opts: ["Playing with fire", "Working late at night", "Wasting resources", "Being angry"], ans: 1, exp: "'Burning the midnight oil' means studying or working late into the night." },
    { q: "The comparative degree of 'Good' is:", opts: ["Gooder", "Better", "Best", "More good"], ans: 1, exp: "'Good' has irregular comparative 'Better' and superlative 'Best'." },
    { q: "Identify the type of sentence: 'What a beautiful day!'", opts: ["Declarative", "Interrogative", "Imperative", "Exclamatory"], ans: 3, exp: "Sentences expressing strong emotion are Exclamatory." },
    { q: "Which is the correct passive voice: 'They are building a new bridge.'", opts: ["A new bridge is being built.", "A new bridge was built.", "A new bridge will be built.", "A new bridge has been built."], ans: 0, exp: "Present Continuous passive: is/am/are + being + V3." },
    { q: "Meaning of 'Verbose':", opts: ["Brief and clear", "Using too many words", "Silent", "Rude"], ans: 1, exp: "'Verbose' means using more words than necessary; wordy." },
    { q: "Antonym of 'Transparent':", opts: ["Clear", "Visible", "Opaque", "Bright"], ans: 2, exp: "'Opaque' means not able to be seen through — opposite of transparent." },
    { q: "Fill in the blank: She ___ here since morning.", opts: ["is", "has been", "was", "had"], ans: 1, exp: "'Has been' (Present Perfect Continuous) with 'since' is correct." },
    { q: "Which word is a preposition?", opts: ["Slowly", "Beautiful", "Above", "Run"], ans: 2, exp: "'Above' shows the relation/position of one thing to another — it is a preposition." },
    { q: "Synonym of 'Diligent':", opts: ["Lazy", "Hardworking", "Careless", "Slow"], ans: 1, exp: "'Diligent' and 'Hardworking' both mean showing careful effort." },
    { q: "Choose the right form: If I ___ you, I would apologize.", opts: ["am", "was", "were", "be"], ans: 2, exp: "In conditional 'If I were you' (subjunctive mood), 'were' is used." },
    { q: "The past tense of 'Teach' is:", opts: ["Teached", "Tought", "Taught", "Teach"], ans: 2, exp: "'Teach' is an irregular verb — past tense is 'Taught'." },
    { q: "One word for 'A person who loves books':", opts: ["Bibliophile", "Philanthropist", "Polyglot", "Bibliophobe"], ans: 0, exp: "'Bibliophile' means a person who loves and collects books." },
    { q: "Correct sentence:", opts: ["I have seen him yesterday.", "I saw him yesterday.", "I had seen him yesterday.", "I see him yesterday."], ans: 1, exp: "With 'yesterday' (specific time), Simple Past tense is used." },
    { q: "Antonym of 'Frugal':", opts: ["Thrifty", "Economical", "Extravagant", "Careful"], ans: 2, exp: "'Frugal' means careful with money; 'Extravagant' is the opposite." },
    { q: "Meaning of the idiom 'Break the ice':", opts: ["Cause damage", "Make people comfortable in a social situation", "Stop something suddenly", "Win a competition"], ans: 1, exp: "'Break the ice' means to do something to relieve tension in a social situation." },
    { q: "Fill in: They ___ the match yesterday.", opts: ["win", "winning", "won", "wins"], ans: 2, exp: "'Won' is the Simple Past form of 'win'." },
    { q: "Which is a compound sentence?", opts: ["She sings.", "She sings and dances.", "She sings beautifully.", "Beautiful singer."], ans: 1, exp: "A compound sentence has two independent clauses joined by a conjunction." },
    { q: "Correct spelling:", opts: ["Grammer", "Gramer", "Grammar", "Gramar"], ans: 2, exp: "The correct spelling is 'Grammar' with double 'm'." },
    { q: "Voice change: 'The teacher taught the students.'", opts: ["Students were taught by the teacher.", "Students are taught by teacher.", "Students had been taught.", "The teacher was teaching."], ans: 0, exp: "Simple Past passive: was/were + V3. Plural subject 'students' → 'were'." },
    { q: "Meaning of 'Ephemeral':", opts: ["Lasting forever", "Lasting for a very short time", "Very important", "Very large"], ans: 1, exp: "'Ephemeral' means lasting for only a short time; temporary." },
    { q: "Choose the correct question tag: 'She can swim, ___?'", opts: ["can she", "can't she", "doesn't she", "isn't she"], ans: 1, exp: "Positive statement → negative question tag: 'can't she'." },
    { q: "Synonym of 'Enigmatic':", opts: ["Clear", "Mysterious", "Simple", "Obvious"], ans: 1, exp: "'Enigmatic' and 'Mysterious' both mean difficult to understand." },
    { q: "Fill in the blank: He is good ___ mathematics.", opts: ["in", "at", "on", "for"], ans: 1, exp: "'Good at' is the correct preposition usage." },
    { q: "Identify the tense: 'She will have completed her work by 5 PM.'", opts: ["Future Simple", "Future Continuous", "Future Perfect", "Future Perfect Continuous"], ans: 2, exp: "'Will have + V3' is Future Perfect Tense." },
    { q: "One word substitute for 'Government by the people':", opts: ["Monarchy", "Oligarchy", "Democracy", "Theocracy"], ans: 2, exp: "'Democracy' means government of the people, by the people, for the people." },
    { q: "Antonym of 'Loquacious':", opts: ["Talkative", "Verbose", "Taciturn", "Expressive"], ans: 2, exp: "'Loquacious' means very talkative; 'Taciturn' means reserved, not talkative." },
    { q: "Correct form: He ___ to the market before I arrived.", opts: ["went", "has gone", "had gone", "goes"], ans: 2, exp: "Past Perfect (had + V3) for action completed before another past action." },
    { q: "Meaning of 'Altruistic':", opts: ["Selfish", "Unselfish and caring about others", "Greedy", "Arrogant"], ans: 1, exp: "'Altruistic' means showing selfless concern for the well-being of others." },
    { q: "Choose correct form: The committee ___ divided in its opinion.", opts: ["is", "are", "were", "have"], ans: 0, exp: "Collective nouns like 'committee' take singular verb when acting as a unit." },
    { q: "Punctuation: Which sentence is correct?", opts: ["Its a beautiful day.", "It's a beautiful day.", "Its' a beautiful day.", "It is's a beautiful day."], ans: 1, exp: "'It's' = 'It is' (contraction). 'Its' is a possessive pronoun." },
    { q: "Fill in: ___ the rain, we enjoyed the picnic.", opts: ["Despite", "Although", "Because of", "Since"], ans: 0, exp: "'Despite + noun/gerund' — 'Despite the rain' is correct usage." },
    { q: "Synonym of 'Magnanimous':", opts: ["Petty", "Generous", "Cruel", "Cowardly"], ans: 1, exp: "'Magnanimous' means very generous or forgiving — synonym is 'Generous'." },
    { q: "Identify the figure of speech: 'The world is a stage.'", opts: ["Simile", "Metaphor", "Personification", "Hyperbole"], ans: 1, exp: "Direct comparison without 'like/as' is a Metaphor." },
  ]
};

let currentSubject = 'gk';
let answers = {};

function init() {
  renderTabs();
  switchSubject('gk');
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  subjects.forEach(s => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (s.id === currentSubject ? ' active' : '');
    tab.style.setProperty('--tab-color', s.color);
    tab.textContent = s.name;
    tab.onclick = () => switchSubject(s.id);
    tabsEl.appendChild(tab);
  });
}

function switchSubject(id) {
  currentSubject = id;
  answers = JSON.parse(localStorage.getItem('ans_' + id) || '{}');
  renderTabs();
  renderQuestions();
  updateStats();
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  const qs = allQuestions[currentSubject];
  const subj = subjects.find(s => s.id === currentSubject);
  container.innerHTML = '';

  qs.forEach((q, i) => {
    const card = document.createElement('div');
    const isAns = answers[i] !== undefined;
    const isCorrect = isAns && answers[i] === q.ans;
    card.className = 'q-card' + (isAns ? (isCorrect ? ' answered-correct' : ' answered-wrong') : '');

    card.innerHTML = `
      <div class="q-num">
        <span class="q-num-badge" style="background:${subj.color}">${i+1}</span>
        प्रश्न ${i+1}
        ${isAns ? (isCorrect ? '<span style="color:var(--correct);margin-left:auto">✓ सही</span>' : '<span style="color:var(--wrong);margin-left:auto">✗ गलत</span>') : ''}
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((opt, j) => `
          <button class="option ${isAns ? (j === q.ans ? 'correct' : (j === answers[i] ? 'wrong' : '')) : ''}"
            onclick="selectAnswer(${i}, ${j})"
            ${isAns ? 'disabled' : ''}
          >${String.fromCharCode(65+j)}) ${opt}</button>
        `).join('')}
      </div>
      <div class="explanation ${isAns ? 'show' : ''}">💡 ${q.exp}</div>
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qi, optIdx) {
  const q = allQuestions[currentSubject][qi];
  answers[qi] = optIdx;
  localStorage.setItem('ans_' + currentSubject, JSON.stringify(answers));
  renderQuestions();
  updateStats();
  // scroll to next unanswered
  setTimeout(() => {
    const cards = document.querySelectorAll('.q-card');
    const next = Array.from(cards).find((c, i) => i > qi && !c.classList.contains('answered-correct') && !c.classList.contains('answered-wrong'));
    if (next) next.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
}

function updateStats() {
  const qs = allQuestions[currentSubject];
  const total = qs.length;
  const answered = Object.keys(answers).length;
  let correct = 0, wrong = 0;
  Object.entries(answers).forEach(([i, ans]) => {
    if (ans === qs[i].ans) correct++;
    else wrong++;
  });
  const pending = total - answered;
  const pct = answered > 0 ? Math.round(correct/answered*100) : 0;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-pending').textContent = pending;
  document.getElementById('prog').style.width = (answered/total*100) + '%';
  document.getElementById('prog-label').textContent = `${answered} / ${total} प्रश्न हल किए`;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-info').textContent = `${correct} सही | ${wrong} गलत`;
}

function resetQuiz() {
  if (confirm('क्या आप सभी उत्तर मिटाना चाहते हैं?')) {
    localStorage.removeItem('ans_' + currentSubject);
    answers = {};
    renderQuestions();
    updateStats();
    window.scrollTo(0, 0);
  }
}

init();
</script>
